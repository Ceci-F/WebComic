<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcomic - Página 3</title>
    <link rel="stylesheet" href="../styles/global.css">
</head>
<body>

    <div class="escenario-3d" data-barba="wrapper">
        <main id="contenedor-principal" class="pagina-comic comic-p3" data-barba="container" data-barba-namespace="comic" data-next="page-4.html" data-prev="page-2.html">
            <div class="grupo-paneles">
                
                <img src="../assets/images/pagina-3/pag_3_line_1.png" alt="Panel 1" data-reveal="always-on">
                <div data-sfx="../assets/audio/pag3_1.mp3">
                    <img src="../assets/images/pagina-3/pag_3_line_1_3.png" alt="Panel 1-3" data-reveal="delay" data-tiempo="3000">
                    <img src="../assets/images/pagina-3/pag_3_line_1_5.png" alt="Panel 1-5" data-reveal="delay" data-tiempo="3000">
                </div>
                
                <img src="../assets/images/pagina-3/pag_3_line_2.png" alt="Panel 2" data-reveal="click">
                
                <img src="../assets/images/pagina-3/page_3_line_3.png" alt="Panel 3" data-reveal="click">
                <div data-reveal-group="textos" data-effect="shake" data-effect-strength-start="0.6" data-effect-strength-step="0.08">
                    <img src="../assets/images/pagina-3/text_box_1.png" alt="Texto 1" data-reveal="delay" data-tiempo="0">
                    <img src="../assets/images/pagina-3/text_box_2.png" alt="Texto 2" data-reveal="delay" data-tiempo="60">
                    <img src="../assets/images/pagina-3/text_box_3.png" alt="Texto 3" data-reveal="delay" data-tiempo="120">
                    <img src="../assets/images/pagina-3/text_box_4.png" alt="Texto 4" data-reveal="delay" data-tiempo="180">
                    <img src="../assets/images/pagina-3/text_box_5.png" alt="Texto 5" data-reveal="delay" data-tiempo="240">
                    <img src="../assets/images/pagina-3/text_box_6.png" alt="Texto 6" data-reveal="delay" data-tiempo="300">
                    <img src="../assets/images/pagina-3/text_box_7.png" alt="Texto 7" data-reveal="delay" data-tiempo="360">
                    <img src="../assets/images/pagina-3/text_box_8.png" alt="Texto 8" data-reveal="delay" data-tiempo="420">
                    <img src="../assets/images/pagina-3/text_box_9.png" alt="Texto 9" data-reveal="delay" data-tiempo="480">
                    <img src="../assets/images/pagina-3/text_box_10.png" alt="Texto 10" data-reveal="delay" data-tiempo="540">
                    <img src="../assets/images/pagina-3/text_box_11.png" alt="Texto 11" data-reveal="delay" data-tiempo="600">
                    <img src="../assets/images/pagina-3/text_box_12.png" alt="Texto 12" data-reveal="delay" data-tiempo="660">
                    <img src="../assets/images/pagina-3/text_box_13.png" alt="Texto 13" data-reveal="delay" data-tiempo="720">
                    <img src="../assets/images/pagina-3/text_box_14.png" alt="Texto 14" data-reveal="delay" data-tiempo="780">
                    <img src="../assets/images/pagina-3/text_box_15.png" alt="Texto 15" data-reveal="delay" data-tiempo="840">
                    <img src="../assets/images/pagina-3/text_box_16.png" alt="Texto 16" data-reveal="delay" data-tiempo="900">
                    <img src="../assets/images/pagina-3/text_box_17.png" alt="Texto 17" data-reveal="delay" data-tiempo="960">
                </div>
                
                <img src="../assets/images/pagina-3/pag_3_line_4.png" alt="Panel 4" data-reveal="click" data-sfx="../assets/audio/pag4_4.mp3">
                
                <img src="../assets/images/pagina-3/pag_3_line_5.png" alt="Panel 5" data-reveal="delay" data-tiempo="500" data-sfx="../assets/audio/pag4_5.mp3">
                
                <img src="../assets/images/pagina-3/page_3_line_6.png" alt="Panel 6" data-reveal="click">

            </div>
        </main>
    </div>

    <script src="https://unpkg.com/@barba/core"></script>
    <script src="../scripts/modules/gsap.min.js"></script>
    <script src="../scripts/main.js"></script>
</body>
</html>
