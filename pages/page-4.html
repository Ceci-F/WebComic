<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcomic - Página 4</title>
    <link rel="stylesheet" href="../styles/global.css">
</head>
<body>

    <div class="escenario-3d" data-barba="wrapper">
        <main id="contenedor-principal" class="pagina-comic comic-p4" data-barba="container" data-barba-namespace="comic" data-prev="page-3.html">
            <div class="grupo-paneles">
                
                <img src="../assets/images/pagina-4/pag_4_line_1.png" alt="Panel 1" data-reveal="always-on">
                
                <img src="../assets/images/pagina-4/pag_4_line_2.png" alt="Panel 2" data-reveal="click">
                
                <img src="../assets/images/pagina-4/pag_4_line_3.png" alt="Panel 3" data-reveal="click">
                <img src="../assets/images/pagina-4/pag_4_line_4.png" alt="Panel 4" data-reveal="delay" data-tiempo="500" >
                <img src="../assets/images/pagina-4/pag_4_line_5.png" alt="Panel 5" data-reveal="delay" data-tiempo="3000" >
                
                <img src="../assets/images/pagina-4/pag_4_fin.png" alt="Panel Fin" data-reveal="click">
                <img src="../assets/images/pagina-4/text_box1.png" alt="Texto 1" data-reveal="click">
                <img src="../assets/images/pagina-4/text_box2.png" alt="Texto 2" data-reveal="click">
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/@barba/core"></script>
    <script src="../scripts/modules/gsap.min.js"></script>
    <script src="../scripts/main.js"></script>
</body>
</html>
