<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Webcomic - Página 1</title>
    <link rel="stylesheet" href="styles/global.css" />
</head>

<body>
    <div class="escenario-3d" data-barba="wrapper">
        <main id="contenedor-principal" class="pagina-comic comic-p1" data-barba="container"
            data-barba-namespace="comic" data-next="pages/page-2.html">
            <div class="grupo-paneles">
                <img src="./assets/images/pagina-1/pag_1_line1-2.png" alt="Panel 1-2" data-reveal="always-on" />
                <img src="./assets/images/pagina-1/cuadro_Texto1.png" alt="texto 1" data-reveal="always-on" />
                <img src="./assets/images/pagina-1/cuadro_Texto2.png" alt="texto 2" data-reveal="always-on" />
                <img src="./assets/images/pagina-1/pag_1_line_3_.png" alt="Panel 3" data-reveal="click" />

                <img src="./assets/images/pagina-1/pag_1_line_4.png" alt="Panel 4" data-reveal="delay"
                    data-tiempo="500" />

                <img src="./assets/images/pagina-1/pag_1_line_5.png" alt="Panel 5" data-reveal="delay"
                    data-tiempo="500" />

                <img src="./assets/images/pagina-1/pag_1_line_6.jpg" alt="Fondo JPG" data-reveal="click" />
                <img src="./assets/images/pagina-1/cuadro_Texto3.png" alt="texto 3" data-reveal="click" />
                <img src="./assets/images/pagina-1/cuadro_Texto4.png" alt="texto 4" data-reveal="click" />
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/@barba/core"></script>
    <script src="./scripts/modules/gsap.min.js"></script>
    <script type="module" src="./scripts/main.js"></script>
</body>

</html>
